        <option value="https://elhgzffxdadlyiplxwnk.supabase.co/storage/v1/object/public/mantras-divine/maha_mrityunjaya.mp3">mrityunjaya_mantra</option>

    <p class="now-playing">
      Now Playing:
      <span id="currentMantra">None</span>
    </p>
    <p class="time">
        <span id="currentTime">00:00</span> /
        <span id="totalTime">00:00</span>
    </p>
   
    <div class="buttons">
  <button class="btn prev" onclick="previousSong()">⏮ Prev</button>
  <button class="btn start" onclick="startChant()">Start</button>
  <button class="btn stop" onclick="stopChant()">Stop</button>
  <button class="btn next" onclick="nextSong()">Next ⏭</button>
  <button class="btn reset" onclick="resetPlaylist()">Reset 🔄</button>
</div>
  </div>

  <audio id="audioPlayer" ></audio>

  <script src="script.js"></script>
</body>
</html>
